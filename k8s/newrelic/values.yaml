# New Relic Kubernetes integration Helm values
# Deploy with: helm upgrade --install newrelic-bundle newrelic/nri-bundle -n newrelic --create-namespace -f k8s/newrelic/values.yaml

global:
  licenseKey: ""  # Set via --set global.licenseKey=$NEW_RELIC_LICENSE_KEY
  cluster: "nr-demo-minikube"
  lowDataMode: true

newrelic-infrastructure:
  enabled: true
  privileged: true

nri-metadata-injection:
  enabled: true

newrelic-prometheus-agentoperator:
  enabled: false

nri-kube-events:
  enabled: true

newrelic-logging:
  enabled: true

kube-state-metrics:
  enabled: true
