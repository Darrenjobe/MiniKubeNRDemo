apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nr-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: nr-demo/frontend:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 3000 }]
          env:
            - name: NR_BROWSER_AGENT
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: NR_BROWSER_AGENT, optional: true } }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }
