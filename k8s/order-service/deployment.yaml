apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: nr-demo
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: nr-demo/order-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: nr-demo-config }
          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: NEW_RELIC_LICENSE_KEY } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: POSTGRES_PASSWORD } }
          readinessProbe:
            httpGet: { path: /health, port: 8081 }
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 15
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "768Mi", cpu: "1000m" }
