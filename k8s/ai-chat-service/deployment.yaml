apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chat-service
  namespace: nr-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: ai-chat-service }
  template:
    metadata:
      labels: { app: ai-chat-service }
    spec:
      containers:
        - name: ai-chat-service
          image: nr-demo/ai-chat-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 8002 }]
          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: NEW_RELIC_LICENSE_KEY } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: ANTHROPIC_API_KEY } }
            - name: GEMINI_API_KEY
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: GEMINI_API_KEY } }
          readinessProbe:
            httpGet: { path: /health, port: 8002 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "512Mi", cpu: "500m" }
