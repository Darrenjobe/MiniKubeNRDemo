apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: nr-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: admin-service }
  template:
    metadata:
      labels: { app: admin-service }
    spec:
      containers:
        - name: admin-service
          image: nr-demo/admin-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 8003 }]
          envFrom:
            - configMapRef: { name: nr-demo-config }
          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: NEW_RELIC_LICENSE_KEY } }
          readinessProbe:
            httpGet: { path: /health, port: 8003 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "300m" }
