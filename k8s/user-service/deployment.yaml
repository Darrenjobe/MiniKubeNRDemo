apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: nr-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
    spec:
      containers:
        - name: user-service
          image: nr-demo/user-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 8001 }]
          envFrom:
            - configMapRef: { name: nr-demo-config }
          env:
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: NEW_RELIC_LICENSE_KEY } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: POSTGRES_PASSWORD } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: nr-demo-secrets, key: JWT_SECRET } }
          readinessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "512Mi", cpu: "500m" }
